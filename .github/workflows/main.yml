name: 'Lint Code'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Print working directory
        run: pwd
      - name: Run Linter
        run: |
          pwd
          find . -name "*.py" -not -path "*/migrations/*" -not -path "*/node_modules/*" -exec flake8 --max-line-length=120 --ignore=E302,W292,F401,E402 {} +
          echo "Linted all the python files successfully"
  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 14
      - name: Install JSHint
        run: npm install -g jshint
      - name: Run Linter
        run: |
          echo '{"esversion": 8, "sub": true}' > .jshintrc
          find . -name "*.js" -not -path "*/node_modules/*" -not -path "*/static/*" -not -path "*/build/*" -not -path "*/frontend/src/*" -exec jshint {} +
          echo "Linted all the javascript files successfully"
